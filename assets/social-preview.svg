<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Shield icon -->
  <g transform="translate(640, 200)" opacity="0.9">
    <path d="M0-60 L50-40 L50 15 Q50 50 0 70 Q-50 50 -50 15 L-50-40 Z"
          fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Checkmark inside shield -->
    <path d="M-18 5 L-6 17 L20-10"
          fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="640" y="340" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace"
        font-size="56" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    agent-egress-bench
  </text>

  <!-- Subtitle -->
  <text x="640" y="400" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" fill="#94a3b8">
    Open test corpus for AI agent egress security
  </text>

  <!-- Bottom text -->
  <text x="640" y="560" text-anchor="middle"
        font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace"
        font-size="15" fill="#475569">
    github.com/luckyPipewrench/agent-egress-bench
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)"/>
</svg>

mode: balanced

scan_api:
  listen: "127.0.0.1:9990"
  auth:
    bearer_tokens: ["bench-test-token"]
  max_body_bytes: 1048576
  kinds:
    url: true
    dlp: true
    prompt_injection: true
    tool_call: true

fetch_proxy:
  listen: "127.0.0.1:9991"
  timeout_seconds: 30
  max_response_mb: 10
  monitoring:
    max_url_length: 2000
    entropy_threshold: 4.0
    max_requests_per_minute: 0
    max_data_per_minute: 0
    blocklist:
      - "*.pastebin.com"
      - "*.hastebin.com"
      - "*.paste.ee"
      - "*.transfer.sh"
      - "*.file.io"
      - "*.requestbin.com"
      - "exfil-collector.example.net"

forward_proxy:
  enabled: true
  sni_verification: true

websocket_proxy:
  enabled: true
  max_message_bytes: 1048576
  max_concurrent_connections: 128
  max_connection_seconds: 60
  idle_timeout_seconds: 15

response_scanning:
  enabled: true
  action: block

request_body_scanning:
  enabled: true
  action: block
  max_body_bytes: 1048576
  scan_headers: true
  header_mode: all

internal: []

dlp:
  patterns:
    - name: "Ethereum Address"
      regex: '0x[0-9a-fA-F]{40}\b'
      severity: high
    - name: "Credit Card Number"
      regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\b'
      severity: high
    - name: "Social Security Number"
      regex: '\b\d{3}-\d{2}-\d{4}\b'
      severity: low
    - name: "IBAN"
      regex: '\b(?:AL|AD|AT|AZ|BH|BY|BE|BA|BR|BG|CR|HR|CY|CZ|DK|DO|TL|EE|FO|FI|FR|GE|DE|GI|GR|GL|GT|HU|IS|IQ|IE|IL|IT|JO|KZ|XK|KW|LV|LB|LI|LT|LU|MK|MT|MR|MU|MC|MD|ME|NL|NO|PK|PS|PL|PT|QA|RO|LC|SM|ST|SA|RS|SC|SK|SI|ES|SE|CH|TN|TR|UA|AE|GB|VA|VG)\d{2}[A-Z0-9]{4}\d{7}([A-Z0-9]?){0,16}\b'
      severity: high
    - name: "Credential in URL"
      regex: '\b(?:password|passwd|secret|token|apikey|api_key|api-key)\s*=\s*[^\s&]{4,}'
      severity: high

mcp_input_scanning:
  enabled: true
  action: block

mcp_tool_scanning:
  enabled: true
  action: block
  detect_drift: true

mcp_tool_policy:
  enabled: false

mcp_session_binding:
  enabled: true
  unknown_tool_action: block

tool_chain_detection:
  enabled: true
  action: block
  pattern_overrides:
    env-then-network: block
    read-then-exec: block
    read-write-send: block
  custom_patterns:
    - name: write-then-exec
      sequence: ["write", "exec"]
      severity: critical
      action: block

seed_phrase_detection:
  enabled: true
  action: block

address_protection:
  enabled: true
  action: block

reverse_proxy:
  enabled: true
  listen: "127.0.0.1:9992"
  upstream: "http://127.0.0.1:9993"

logging:
  level: warn
  format: json
  output: stdout
  include_allowed: false
  include_blocked: true
